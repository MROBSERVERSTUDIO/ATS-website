<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS - Login | AI-Powered Trading That Works 24/7</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" sizes="16x16">
  <!-- bootstrap 4 -->
  <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
  <!-- fontawesome 5 -->
  <link rel="stylesheet" href="assets/css/all.min.css">
  <!-- line-awesome webfont -->
  <link rel="stylesheet" href="assets/css/line-awesome.min.css">
  <link rel="stylesheet" href="assets/css/vendor/animate.min.css">
  <!-- slick slider css -->
  <link rel="stylesheet" href="assets/css/vendor/slick.css">
  <link rel="stylesheet" href="assets/css/vendor/dots.css">
  <!-- ATS main css -->
  <link rel="stylesheet" href="assets/css/main.css">

  <style>
    /* ================================================
       ATS Login Page — Inline Enhancements
       Background images handled by data-background + app.js
    ================================================ */

    /* Full viewport account section
       BG IMAGE → replace bg-5.jpg with dark AI/neural network image */
    .account-section {
      position: relative;
    }

    /* Subtle radial glow behind the card */
    .account-section::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(10,132,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Card header title */
    .account-card__header .section-title {
      font-size: 28px !important;
    }

    /* Card header subtitle */
    .account-card__header p {
      color: rgba(232,234,246,0.75);
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.7;
    }

    /* Login title */
    .account-card__body h3 {
      background: linear-gradient(135deg, #ffffff 0%, #00D4FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 22px;
      letter-spacing: 1px;
    }

    /* Form group spacing */
    .account-card__body .form-group {
      margin-bottom: 20px;
    }

    /* Remember me label */
    .form-check-label {
      color: rgba(232,234,246,0.65);
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    /* Sign up link text */
    .account-card__body .f-size-14 {
      color: rgba(232,234,246,0.55);
      font-size: 13px;
    }

    .account-card__body .f-size-14 a {
      color: #00D4FF;
      font-weight: 600;
    }

    .account-card__body .f-size-14 a:hover {
      color: #00FFB3;
    }

    /* Forgot password link */
    .ats-forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(232,234,246,0.45);
    }

    .ats-forgot-link a {
      color: rgba(10,132,255,0.8);
      font-size: 13px;
    }

    .ats-forgot-link a:hover {
      color: #00D4FF;
    }

    /* Security badges strip */
    .ats-security-strip {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(10,132,255,0.12);
    }

    .ats-security-strip .badge-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(232,234,246,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ats-security-strip .badge-item i {
      color: #00FFB3;
      font-size: 13px;
    }

    /* AI live dot in header */
    .ats-live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #00FFB3;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    .ats-live-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #00FFB3;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,255,179,0.8);
      animation: loginPulse 1.5s ease-in-out infinite;
    }

    @keyframes loginPulse {
      0%,100% { opacity:1; box-shadow: 0 0 8px rgba(0,255,179,0.8); }
      50%      { opacity:0.4; box-shadow: 0 0 3px rgba(0,255,179,0.3); }
    }

    /* Submit button full width */
    .account-card__body .cmn-btn {
      width: 100%;
      justify-content: center;
    }

    /* Scroll rocket */
    .scroll-to-top .scroll-icon i { transform: rotate(0deg) !important; font-size:20px; }
  </style>
</head>

<body>

  <!-- Preloader -->
  <div class="preloader">
    <div class="preloader-container">
      <span class="animated-preloader"></span>
    </div>
  </div>

  <!-- Scroll to top -->
  <div class="scroll-to-top">
    <span class="scroll-icon">
      <i class="fa fa-rocket" aria-hidden="true"></i>
    </span>
  </div>

  <!-- Star Field Background -->
  <div class="full-wh">
    <div class="bg-animation">
      <div id='stars'></div>
      <div id='stars2'></div>
      <div id='stars3'></div>
      <div id='stars4'></div>
    </div>
  </div>

  <div class="page-wrapper">

    <!-- ============================================================
         ACCOUNT / LOGIN SECTION
         BG IMAGE → replace bg-5.jpg with dark AI/abstract background
         e.g. neural network, dark trading dashboard, circuit paths
    ============================================================ -->
    <div class="account-section bg_img" data-background="assets/images/bg/bg-5.jpg">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-xl-5 col-lg-7">

            <div class="account-card">

              <!-- Card header
                   BG IMAGE → replace bg-6.jpg with dark glowing ATS branded image
                   overlay--one class darkens it automatically -->
              <div class="account-card__header bg_img overlay--one"
                data-background="assets/images/bg/bg-6.jpg">

                <!-- AI live indicator -->
                <div class="ats-live-dot">AI Engine Active</div>

                <h2 class="section-title">
                  Welcome to
                  <span style="
                    color: #00FFB3;
                    -webkit-text-fill-color: #00FFB3;
                    display: block;
                    margin-top: 4px;
                    font-size: 32px;
                  ">ATS Platform</span>
                </h2>

                <p>
                  Access your AI trading dashboard. Your bots are working
                  around the clock to grow your portfolio — log in to monitor
                  real-time performance and manage your strategies.
                </p>

              </div>
              <!-- account-card__header end -->

              <!-- Card body — login form -->
              <div class="account-card__body">

                <h3 class="text-center">
                  <i class="las la-sign-in-alt" style="font-size:20px; margin-right:8px; -webkit-text-fill-color:#00D4FF;"></i>
                  Sign In
                </h3>

                <form class="mt-4">

                  <div class="form-group">
                    <label>
                      <i class="las la-user" style="color:#0A84FF; margin-right:5px;"></i>
                      Username
                    </label>
                    <input type="text" class="form-control" placeholder="Enter your username">
                  </div>

                  <div class="form-group">
                    <label>
                      <i class="las la-lock" style="color:#0A84FF; margin-right:5px;"></i>
                      Password
                    </label>
                    <input type="password" class="form-control" placeholder="Enter your password">
                  </div>

                  <div class="form-row">
                    <div class="col-sm-6">
                      <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Remember me</label>
                      </div>
                    </div>
                    <div class="col-sm-6 text-sm-right">
                      <p class="f-size-14">
                        No account? <a href="registration.html">Sign Up</a>
                      </p>
                    </div>
                  </div>

                  <div class="mt-3">
                    <button class="cmn-btn">
                      <i class="las la-rocket" style="margin-right:6px;"></i>Login Now
                    </button>
                  </div>

                </form>

                <!-- Forgot password -->
                <div class="ats-forgot-link">
                  <a href="#">Forgot your password?</a>
                </div>

                <!-- Security badges -->
                <div class="ats-security-strip">
                  <span class="badge-item">
                    <i class="las la-shield-alt"></i> 256-bit SSL
                  </span>
                  <span class="badge-item">
                    <i class="las la-lock"></i> 2FA Ready
                  </span>
                  <span class="badge-item">
                    <i class="las la-eye-slash"></i> Private
                  </span>
                </div>

              </div>
              <!-- account-card__body end -->

            </div>
            <!-- account-card end -->

          </div>
        </div>
      </div>
    </div>
    <!-- account section end -->

  </div><!-- page-wrapper end -->

  <!-- Scripts — all preserved exactly as original -->
  <script src="assets/js/vendor/jquery-3.5.1.min.js"></script>
  <script src="assets/js/vendor/bootstrap.bundle.min.js"></script>
  <script src="assets/js/vendor/slick.min.js"></script>
  <script src="assets/js/vendor/wow.min.js"></script>
  <script src="assets/js/contact.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
